<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>实习老师大冒险 - 数学学习游戏</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Microsoft YaHei', 'PingFang SC', sans-serif; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; }
        .hidden { display: none !important; }
        .game-container { max-width: 900px; margin: 0 auto; padding: 20px; }
        .card { background: white; border-radius: 20px; padding: 30px; box-shadow: 0 20px 60px rgba(0,0,0,0.3); margin: 20px 0; animation: fadeIn 0.5s ease; }
        @keyframes fadeIn { from { opacity:0; transform:translateY(20px); } to { opacity:1; transform:translateY(0); } }
        @keyframes bounce { 0%,100% { transform:scale(1); } 50% { transform:scale(1.1); } }
        @keyframes shake { 0%,100% { transform:translateX(0); } 25% { transform:translateX(-5px); } 75% { transform:translateX(5px); } }
        @keyframes starPop { 0% { transform:scale(0); opacity:0; } 50% { transform:scale(1.3); opacity:1; } 100% { transform:scale(1); opacity:1; } }
        @keyframes confetti { 0% { transform:translateY(0) rotate(0); opacity:1; } 100% { transform:translateY(500px) rotate(720deg); opacity:0; } }
        @keyframes pulse { 0%,100% { box-shadow: 0 0 0 0 rgba(102,126,234,0.4); } 50% { box-shadow: 0 0 0 15px rgba(102,126,234,0); } }
        @keyframes drawLine { from { stroke-dashoffset: 1000; } to { stroke-dashoffset: 0; } }
        @keyframes numberPop { 0% { transform:scale(0); opacity:0; } 60% { transform:scale(1.3); } 100% { transform:scale(1); opacity:1; } }
        @keyframes slideInLeft { from { transform:translateX(-50px); opacity:0; } to { transform:translateX(0); opacity:1; } }
        @keyframes slideInRight { from { transform:translateX(50px); opacity:0; } to { transform:translateX(0); opacity:1; } }
        @keyframes highlightBlink { 0%,100% { background:rgba(255,193,7,0.3); } 50% { background:rgba(255,193,7,0.7); } }

        .title { text-align:center; color:#333; font-size:28px; margin-bottom:20px; }
        .subtitle { text-align:center; color:#666; font-size:16px; margin-bottom:30px; }
        .btn { display:inline-block; padding:12px 30px; border:none; border-radius:25px; font-size:18px; font-weight:bold; cursor:pointer; transition:all 0.3s ease; }
        .btn:hover { transform:translateY(-2px); box-shadow:0 5px 20px rgba(0,0,0,0.2); }
        .btn-primary { background:linear-gradient(135deg,#667eea,#764ba2); color:white; }
        .btn-success { background:linear-gradient(135deg,#43e97b,#38f9d7); color:#333; }
        .btn-warning { background:linear-gradient(135deg,#f093fb,#f5576c); color:white; }
        .btn-info { background:linear-gradient(135deg,#4facfe,#00f2fe); color:white; }

        #start-screen { text-align:center; padding:50px 20px; }
        #start-screen .emoji-big { font-size:80px; margin-bottom:20px; animation:bounce 2s infinite; }
        #start-screen h1 { font-size:36px; color:#333; margin-bottom:10px; }
        #start-screen p { color:#666; font-size:18px; margin-bottom:30px; line-height:1.8; }

        .progress-bar { width:100%; height:12px; background:#e0e0e0; border-radius:6px; margin:15px 0; overflow:hidden; }
        .progress-fill { height:100%; background:linear-gradient(90deg,#43e97b,#38f9d7); border-radius:6px; transition:width 0.5s ease; }

        .level-grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(150px,1fr)); gap:15px; margin:20px 0; }
        .level-item { background:#f8f9fa; border-radius:15px; padding:20px; text-align:center; cursor:pointer; transition:all 0.3s ease; border:3px solid transparent; }
        .level-item:hover { transform:translateY(-5px); border-color:#667eea; }
        .level-item.completed { border-color:#43e97b; background:#e8fdf5; }
        .level-item.locked { opacity:0.5; cursor:not-allowed; }
        .level-item .level-icon { font-size:40px; margin-bottom:10px; }
        .level-item .level-name { font-size:14px; color:#333; font-weight:bold; }

        .top-bar { display:flex; justify-content:space-between; align-items:center; margin-bottom:15px; padding:10px 15px; background:rgba(255,255,255,0.9); border-radius:12px; }
        .score-display { font-size:16px; font-weight:bold; color:#667eea; }

        .question-box { background:linear-gradient(135deg,#f5f7fa,#c3cfe2); border-radius:15px; padding:25px; margin:20px 0; text-align:center; }
        .question-box h3 { color:#333; font-size:20px; margin-bottom:15px; }
        .question-box p { color:#555; font-size:16px; line-height:1.6; }
        .scene-img { font-size:60px; margin:10px 0; display:block; text-align:center; }

        .visual-area { background:#fff; border:2px dashed #ccc; border-radius:15px; padding:20px; margin:20px 0; min-height:150px; display:flex; align-items:center; justify-content:center; flex-direction:column; }
        .shape-visual { position:relative; margin:20px auto; border:4px solid #667eea; display:flex; align-items:center; justify-content:center; background:rgba(102,126,234,0.1); }
        .shape-label { position:absolute; font-size:14px; font-weight:bold; color:#667eea; background:white; padding:2px 8px; border-radius:4px; }
        .shape-label.top { top:-14px; left:50%; transform:translateX(-50%); }
        .shape-label.left { left:-12px; top:50%; transform:translateY(-50%) rotate(-90deg); }

        .answer-options { display:grid; grid-template-columns:repeat(2,1fr); gap:10px; max-width:500px; margin:20px auto; }
        .option-btn { padding:15px; border:3px solid #e0e0e0; border-radius:12px; background:white; font-size:16px; cursor:pointer; transition:all 0.3s ease; }
        .option-btn:hover { border-color:#667eea; background:#f5f0ff; }
        .option-btn.correct { border-color:#43e97b; background:#e8fdf5; animation:bounce 0.5s; }
        .option-btn.wrong { border-color:#f5576c; background:#fff5f5; animation:shake 0.5s; }

        .answer-input { width:200px; padding:12px 20px; font-size:20px; border:3px solid #667eea; border-radius:15px; text-align:center; outline:none; }
        .answer-input:focus { border-color:#764ba2; box-shadow:0 0 15px rgba(102,126,234,0.3); }

        .feedback { padding:15px 25px; border-radius:12px; margin:15px 0; text-align:center; font-size:18px; font-weight:bold; animation:fadeIn 0.3s ease; }
        .feedback.success { background:#e8fdf5; color:#27ae60; border:2px solid #43e97b; }
        .feedback.error { background:#fff5f5; color:#e74c3c; border:2px solid #f5576c; }
        .feedback.info { background:#eef6ff; color:#2980b9; border:2px solid #4facfe; }

        .stars { text-align:center; margin:20px 0; }
        .star { font-size:40px; display:inline-block; animation:starPop 0.5s forwards; opacity:0; }
        .star:nth-child(1) { animation-delay:0.2s; }
        .star:nth-child(2) { animation-delay:0.4s; }
        .star:nth-child(3) { animation-delay:0.6s; }

        .formula-card { background:linear-gradient(135deg,#a8edea,#fed6e3); border-radius:12px; padding:15px 20px; margin:10px 0; font-size:16px; font-weight:bold; text-align:center; color:#333; }
        .example-box { background:#f0f8ff; border-left:4px solid #4facfe; border-radius:0 12px 12px 0; padding:12px 18px; margin:8px 0; font-size:14px; color:#555; }
        .example-box .example-title { font-weight:bold; color:#2980b9; margin-bottom:5px; }

        .tile-grid { display:inline-grid; gap:1px; background:#333; padding:1px; border-radius:5px; }
        .tile { width:40px; height:40px; background:#f5f5f5; display:flex; align-items:center; justify-content:center; cursor:pointer; transition:all 0.2s; font-size:12px; }
        .tile.counted { background:#ffb74d; }

        .chat-area { max-height:300px; overflow-y:auto; padding:10px; margin:15px 0; border:1px solid #eee; border-radius:15px; }
        .chat-bubble { border-radius:15px; padding:15px 20px; margin:10px 0; max-width:85%; animation:fadeIn 0.3s ease; }
        .chat-bubble.student { background:#e3f2fd; margin-right:auto; border-bottom-left-radius:5px; }
        .chat-bubble.teacher { background:#e8f5e9; margin-left:auto; border-bottom-right-radius:5px; }

        .hint-box { background:#fff9c4; border:2px solid #ffd54f; border-radius:12px; padding:15px; margin:15px 0; font-size:14px; }

        .certificate { background:linear-gradient(135deg,#ffecd2,#fcb69f); border:3px solid #f093fb; border-radius:20px; padding:30px; text-align:center; margin:20px 0; }
        .certificate h2 { color:#764ba2; margin-bottom:15px; }
        .certificate .cert-stamp { font-size:60px; margin:15px 0; }

        .confetti-container { position:fixed; top:0; left:0; width:100%; height:100%; pointer-events:none; z-index:9999; }
        .confetti-piece { position:absolute; width:10px; height:10px; top:-10px; animation:confetti 3s ease-in forwards; }

        /* 动画讲解样式 */
        .anim-overlay { position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.7); z-index:10000; display:flex; align-items:center; justify-content:center; animation:fadeIn 0.3s; }
        .anim-panel { background:white; border-radius:24px; padding:35px; max-width:600px; width:90%; max-height:80vh; overflow-y:auto; animation:fadeIn 0.4s; }
        .anim-panel h3 { text-align:center; color:#667eea; margin-bottom:20px; font-size:22px; }
        .anim-step { padding:12px 18px; margin:8px 0; border-radius:12px; background:#f8f9fa; border-left:4px solid #667eea; opacity:0; transform:translateX(-20px); transition:all 0.5s ease; }
        .anim-step.show { opacity:1; transform:translateX(0); }
        .anim-step .step-num { display:inline-block; width:28px; height:28px; line-height:28px; text-align:center; background:#667eea; color:white; border-radius:50%; font-size:14px; font-weight:bold; margin-right:10px; }
        .anim-step .step-text { font-size:16px; color:#333; }
        .anim-step.highlight { background:#fff3cd; border-left-color:#ffc107; animation:highlightBlink 1s 2; }
        .anim-result { text-align:center; padding:20px; margin:15px 0; background:linear-gradient(135deg,#e8fdf5,#d4efdf); border-radius:15px; font-size:24px; font-weight:bold; color:#27ae60; opacity:0; transition:all 0.5s; }
        .anim-result.show { opacity:1; }
        .anim-shape { text-align:center; margin:15px 0; }
        .anim-shape svg { max-width:300px; }

        /* 语音按钮 */
        .voice-btn { background:#667eea; border:none; color:white; width:36px; height:36px; border-radius:50%; font-size:16px; cursor:pointer; margin-left:10px; vertical-align:middle; transition:all 0.3s; }
        .voice-btn:hover { background:#764ba2; transform:scale(1.1); }
        .voice-btn.playing { animation:pulse 1s infinite; background:#f5576c; }

        /* 培训情境 */
        .story-box { background:linear-gradient(135deg,#ffecd2,#fcb69f); border-radius:15px; padding:20px; margin:15px 0; text-align:center; border:2px solid #f093fb; }
        .story-box .story-char { font-size:50px; margin-bottom:10px; }
        .story-box .story-text { font-size:15px; color:#5d4037; line-height:1.8; }

        @media (max-width:600px) {
            .card { padding:20px; } .title { font-size:22px; }
            .answer-options { grid-template-columns:1fr; }
            .tile { width:30px; height:30px; }
            #start-screen h1 { font-size:28px; }
            .anim-panel { padding:20px; }
        }
    </style>
</head>
<body>
<div class="game-container" id="app">
    <!-- 开始页面 -->
    <div class="card" id="start-screen">
        <div class="emoji-big">👨‍🏫</div>
        <h1>实习老师大冒险</h1>
        <p>📢 紧急通知！<br>
        数学王国小学的张老师今天生病了，<br>
        急需一位实习老师来代课！<br><br>
        🎉 恭喜你被选中啦！<br>
        但是在正式走上讲台之前……<br>
        你需要先通过<strong>上岗培训</strong>！<br><br>
        🏫 培训通过后，你就能教三年级的小朋友们<br>
        学习"周长和面积"的知识啦！</p>
        <button class="btn btn-primary" onclick="startGame()">🚀 接受任务，开始培训！</button>
    </div>

    <!-- 阶段一：关卡选择 -->
    <div class="card hidden" id="phase1-screen">
        <div class="top-bar">
            <span class="score-display">⭐ 得分: <span id="total-score">0</span></span>
            <span>📋 上岗培训中</span>
        </div>
        <h2 class="title">📚 第一阶段：上岗培训</h2>
        <div class="story-box">
            <div class="story-char">🧑‍💼</div>
            <div class="story-text">校长说："要成为合格的老师，你必须先自己掌握这些知识！<br>完成以下5个培训关卡，才能获得<strong>上岗资格证</strong>哦！"</div>
        </div>
        <div class="progress-bar"><div class="progress-fill" id="phase1-progress" style="width:0%"></div></div>
        <div class="level-grid" id="level-grid"></div>
    </div>

    <!-- 游戏内容 -->
    <div class="card hidden" id="game-screen">
        <div class="top-bar">
            <span class="score-display">⭐ <span id="game-score">0</span>分</span>
            <button class="btn btn-info" style="padding:8px 15px;font-size:14px;" onclick="showHint()">💡 提示</button>
        </div>
        <div id="game-content"></div>
    </div>

    <!-- 关卡完成 -->
    <div class="card hidden" id="level-complete-screen">
        <h2 class="title">🎉 培训关卡完成！</h2>
        <div class="stars" id="level-stars"></div>
        <p class="subtitle" id="level-complete-msg"></p>
        <div style="text-align:center;">
            <button class="btn btn-primary" onclick="backToLevels()">继续培训 →</button>
        </div>
    </div>

    <!-- 阶段二：教学 -->
    <div class="card hidden" id="phase2-screen">
        <h2 class="title">🎓 第二阶段：模拟教学</h2>
        <p class="subtitle">培训通过了！现在正式走上讲台啦！</p>
        <div id="teaching-content"></div>
    </div>

    <!-- 最终结果 -->
    <div class="card hidden" id="final-screen">
        <div id="final-content"></div>
    </div>
</div>
<div class="confetti-container" id="confetti-container"></div>

<script>
// ========== 游戏状态 ==========
const GS = { score:0, currentLevel:0, levelsCompleted:[false,false,false,false,false], currentQuestion:0, questionsInLevel:[], correctInLevel:0, teachingScore:0 };

// ========== 薄弱点追踪系统 ==========
const WeaknessTracker = {
    records: [], // { level, question, type:'wrong'|'hint'|'viewAnswer', topic, detail, formula }
    
    // 记录答错
    recordWrong(levelIndex, questionIndex, topic, detail, formula) {
        this.records.push({ level:levelIndex, question:questionIndex, type:'wrong', topic, detail, formula, time:Date.now() });
    },
    
    // 记录查看提示
    recordHint(levelIndex, questionIndex, topic, detail) {
        this.records.push({ level:levelIndex, question:questionIndex, type:'hint', topic, detail, time:Date.now() });
    },
    
    // 记录查看答案（动画讲解）
    recordViewAnswer(levelIndex, questionIndex, topic, detail, formula) {
        this.records.push({ level:levelIndex, question:questionIndex, type:'viewAnswer', topic, detail, formula, time:Date.now() });
    },
    
    // 记录教学阶段错误
    recordTeachWrong(studentName, questionText, correctAnswer) {
        this.records.push({ level:'teaching', type:'teachWrong', topic:'teaching', detail:questionText, correctAnswer, studentName, time:Date.now() });
    },
    
    // 分析薄弱点
    analyze() {
        const topicMap = {
            'perimeter': '周长计算',
            'area': '面积概念（数格子）',
            'areaCalc': '面积公式计算',
            'reverse': '反推（已知周长/面积求边长）',
            'mixed': '综合运用',
            'teaching': '教学表达能力'
        };
        
        const formulaMap = {
            'rect_perimeter': '长方形周长 =（长＋宽）× 2',
            'square_perimeter': '正方形周长 = 边长 × 4',
            'rect_area': '长方形面积 = 长 × 宽',
            'square_area': '正方形面积 = 边长 × 边长',
            'findW_p': '宽 = 周长 ÷ 2 - 长',
            'findL_p': '长 = 周长 ÷ 2 - 宽',
            'findS': '正方形边长 = 周长 ÷ 4',
            'findW_a': '宽 = 面积 ÷ 长',
            'findL_a': '长 = 面积 ÷ 宽'
        };
        
        // 按主题分类统计
        const topicStats = {};
        this.records.forEach(r => {
            if (!topicStats[r.topic]) topicStats[r.topic] = { wrong:0, hint:0, viewAnswer:0, teachWrong:0, details:[], formulas:new Set() };
            if (r.type === 'wrong') topicStats[r.topic].wrong++;
            if (r.type === 'hint') topicStats[r.topic].hint++;
            if (r.type === 'viewAnswer') topicStats[r.topic].viewAnswer++;
            if (r.type === 'teachWrong') topicStats[r.topic].teachWrong++;
            if (r.detail) topicStats[r.topic].details.push(r.detail);
            if (r.formula) topicStats[r.topic].formulas.add(r.formula);
        });
        
        // 生成薄弱点列表（按严重程度排序）
        const weaknesses = [];
        Object.keys(topicStats).forEach(topic => {
            const s = topicStats[topic];
            const severity = s.wrong * 3 + s.viewAnswer * 2 + s.hint * 1 + s.teachWrong * 2;
            if (severity > 0) {
                weaknesses.push({
                    topic,
                    topicName: topicMap[topic] || topic,
                    wrongCount: s.wrong,
                    hintCount: s.hint,
                    viewAnswerCount: s.viewAnswer,
                    teachWrongCount: s.teachWrong,
                    severity,
                    formulas: [...s.formulas].map(f => formulaMap[f] || f),
                    details: s.details
                });
            }
        });
        weaknesses.sort((a,b) => b.severity - a.severity);
        
        return { weaknesses, topicMap, totalErrors: this.records.filter(r=>r.type==='wrong'||r.type==='teachWrong').length, totalHints: this.records.filter(r=>r.type==='hint').length };
    },
    
    // 生成建议
    getSuggestions(weaknesses) {
        const suggestions = [];
        weaknesses.forEach(w => {
            if (w.topic === 'perimeter') {
                suggestions.push({ icon:'🐑', title:'周长计算需加强', tip:'建议用手指沿着图形边走一圈，感受"周长=绕一圈的距离"。多练习(长+宽)×2的口算。', practice:'找家里的桌子、书本，用尺子量一圈，亲手算周长！' });
            } else if (w.topic === 'area') {
                suggestions.push({ icon:'🧱', title:'面积概念需巩固', tip:'面积就是"铺满需要多少块1平方米的砖"。建议用格子纸画长方形，动手数格子。', practice:'拿一张方格纸，画出不同大小的长方形，数一数里面有多少格子！' });
            } else if (w.topic === 'areaCalc') {
                suggestions.push({ icon:'🌻', title:'面积公式需多练', tip:'记住：长方形面积=长×宽，正方形面积=边长×边长。建议多做计算练习。', practice:'计算家里各个房间地面的面积，量出长和宽再相乘！' });
            } else if (w.topic === 'reverse') {
                suggestions.push({ icon:'🔍', title:'反推能力需提升', tip:'反推题是"知道结果求原因"。建议先回忆原公式，再想"缺的是哪个数"，用除法找出来。', practice:'出一些"已知周长/面积，求边长"的题目反复练习，记住÷2再减、或直接÷的方法！' });
            } else if (w.topic === 'mixed') {
                suggestions.push({ icon:'🏆', title:'综合运用需强化', tip:'综合题需要先判断"求什么"（周长还是面积？正推还是反推？），再选对公式。', practice:'每次做题前先问自己：这道题要求的是周长还是面积？是长方形还是正方形？用哪个公式？' });
            } else if (w.topic === 'teaching') {
                suggestions.push({ icon:'👨‍🏫', title:'知识表达需练习', tip:'知道答案不够，还要能给别人讲明白。建议用自己的话复述公式的含义。', practice:'试着给爸爸妈妈讲一讲什么是周长、什么是面积，看他们能不能听懂！' });
            }
        });
        return suggestions;
    },
    
    // 重置
    reset() { this.records = []; }
};

// ========== 语音功能 ==========
function speak(text, callback) {
    if ('speechSynthesis' in window) {
        window.speechSynthesis.cancel();
        const u = new SpeechSynthesisUtterance(text);
        u.lang = 'zh-CN'; u.rate = 0.9; u.pitch = 1.2;
        // 尝试找一个中文女声
        const voices = window.speechSynthesis.getVoices();
        const zhVoice = voices.find(v => v.lang.includes('zh') && v.name.includes('female')) || voices.find(v => v.lang.includes('zh'));
        if (zhVoice) u.voice = zhVoice;
        if (callback) u.onend = callback;
        window.speechSynthesis.speak(u);
        return true;
    }
    return false;
}
// 预加载语音
if ('speechSynthesis' in window) window.speechSynthesis.getVoices();

// ========== 动画讲解功能 ==========
function showAnimExplain(data) {
    // data: { title, shape, steps[], result }
    const overlay = document.createElement('div');
    overlay.className = 'anim-overlay';
    overlay.id = 'anim-overlay';
    
    let shapeHTML = '';
    if (data.shape) {
        shapeHTML = `<div class="anim-shape">${data.shape}</div>`;
    }
    
    overlay.innerHTML = `<div class="anim-panel">
        <h3>📖 ${data.title}</h3>
        ${shapeHTML}
        <div id="anim-steps">${data.steps.map((s,i) => 
            `<div class="anim-step" id="anim-step-${i}"><span class="step-num">${i+1}</span><span class="step-text">${s}</span></div>`
        ).join('')}</div>
        <div class="anim-result" id="anim-result">${data.result}</div>
        <div style="text-align:center;margin-top:20px">
            <button class="btn btn-primary" id="anim-close-btn" style="display:none" onclick="closeAnim()">✅ 我学会了！继续答题</button>
        </div>
    </div>`;
    document.body.appendChild(overlay);
    
    // 逐步显示动画
    let delay = 300;
    data.steps.forEach((_, i) => {
        setTimeout(() => {
            const step = document.getElementById(`anim-step-${i}`);
            if (step) { step.classList.add('show'); if (i === data.steps.length-1) step.classList.add('highlight'); }
        }, delay);
        delay += 800;
    });
    setTimeout(() => {
        const r = document.getElementById('anim-result');
        if (r) r.classList.add('show');
        const btn = document.getElementById('anim-close-btn');
        if (btn) btn.style.display = 'inline-block';
    }, delay + 500);
}

function closeAnim() {
    const o = document.getElementById('anim-overlay');
    if (o) o.remove();
}

function startGame() { hide('start-screen'); show('phase1-screen'); renderLevelGrid(); }

function renderLevelGrid() {
    const grid = document.getElementById('level-grid');
    grid.innerHTML = levels.map((lv, i) => {
        let cls = '';
        if (GS.levelsCompleted[i]) cls = 'completed';
        else if (i > 0 && !GS.levelsCompleted[i-1]) cls = 'locked';
        return `<div class="level-item ${cls}" onclick="startLevel(${i})">

}

function updateProgress() {
    const done = GS.levelsCompleted.filter(x=>x).length;
    document.getElementById('phase1-progress').style.width = (done/5*100)+'%';
    document.getElementById('total-score').textContent = GS.score;

function startLevel(i) {
    if (i > 0 && !GS.levelsCompleted[i-1]) return;
    if (GS.levelsCompleted[i]) return;
    GS.currentLevel = i; GS.currentQuestion = 0; GS.correctInLevel = 0;
    hide('phase1-screen'); show('game-screen');
    document.getElementById('game-score').textContent = GS.score;
    loadLevel(i);
}

function loadLevel(i) {
    switch(levels[i].topic) {
        case 'perimeter': loadPerimeter(); break;
        case 'area': loadArea(); break;
        case 'areaCalc': loadAreaCalc(); break;
        case 'reverse': loadReverse(); break;

function showReverseQ(qi) {
    if (qi >= GS.questionsInLevel.length) { completeLevel(); return; }
    GS.currentQuestion = qi;
    const q = GS.questionsInLevel[qi];
    let answer, formula, example, hintText, visual;
    
    if (q.type === 'findW_p') {
        answer = q.P/2 - q.l;
        formula = '宽 = 周长 ÷ 2 - 长';
        example = '比如周长=16米，长=5米，那宽=16÷2-5=8-5=3米';
        hintText = `${q.P}÷2 - ${q.l} = ${q.P/2} - ${q.l} = ${answer}米`;
        visual = makeShapeVis(q.l*22, answer*22, q.l+'米', '?米', `周长=${q.P}米`);
    } else if (q.type === 'findL_p') {
        answer = q.P/2 - q.w;
        formula = '长 = 周长 ÷ 2 - 宽';
        example = '比如周长=18米，宽=3米，那长=18÷2-3=9-3=6米';
        hintText = `${q.P}÷2 - ${q.w} = ${q.P/2} - ${q.w} = ${answer}米`;
        visual = makeShapeVis(answer*22, q.w*22, '?米', q.w+'米', `周长=${q.P}米`);
    } else if (q.type === 'findS') {
        answer = q.P/4;
        formula = '正方形边长 = 周长 ÷ 4';
        example = '比如周长=20米，边长=20÷4=5米，因为正方形有4条相等的边';
        hintText = `${q.P}÷4 = ${answer}米`;
        visual = makeShapeVis(answer*22, answer*22, '?米', '?米', `周长=${q.P}米`);
    } else if (q.type === 'findW_a') {
        answer = q.A/q.l;
        formula = '宽 = 面积 ÷ 长';
        example = '比如面积=12平方米，长=4米，那宽=12÷4=3米';
        hintText = `${q.A}÷${q.l} = ${answer}米`;
        visual = makeShapeVis(q.l*22, answer*22, q.l+'米', '?米', `面积=${q.A}m²`);
    } else {
        answer = q.A/q.w;
        formula = '长 = 面积 ÷ 宽';
        example = '比如面积=20平方米，宽=4米，那长=20÷4=5米';
        hintText = `${q.A}÷${q.w} = ${answer}米`;
        visual = makeShapeVis(answer*22, q.w*22, '?米', q.w+'米', `面积=${q.A}m²`);
    }
    
    const opts = genOptions(answer);
    document.getElementById('game-content').innerHTML = `
        <h3 style="text-align:center;margin-bottom:10px">🔍 关卡4：神秘侦探 (${qi+1}/${GS.questionsInLevel.length})</h3>
        <div class="story-box" style="background:linear-gradient(135deg,#ede7f6,#d1c4e9);border-color:#9575cd">
            <div class="story-char">🧑‍💼</div>
            <div class="story-text">培训导师说："当老师经常需要反过来推算！像侦探一样找出隐藏的数字！"</div>
        </div>
        <div class="formula-card">📐 ${formula}</div>
        <div class="example-box"><div class="example-title">💡 举个例子：</div>${example}</div>
        <div class="question-box">
            <div class="scene-img">${q.sceneImg}</div>
            <h3>第${qi+1}题</h3>
            <p>${q.scene}</p>
        </div>
        ${visual}
        <div class="answer-options">${opts.map(o=>`<button class="option-btn" onclick="checkReverse(${o},${answer},this,${qi})">${o}米</button>`).join('')}</div>
        <div id="feedback-area"></div>
        <div class="hint-box hidden" id="hint-box">💡 ${hintText}</div>
    `;
}

function checkReverse(selected, correct, btn, qi) {
    const btns = document.querySelectorAll('.option-btn');
    btns.forEach(b => b.style.pointerEvents = 'none');
    if (selected === correct) {
        btn.classList.add('correct');
        GS.correctInLevel++; GS.score += 20;
        document.getElementById('game-score').textContent = GS.score;
        showFB('✅ 侦探推理成功！','success');
        setTimeout(() => showReverseQ(qi+1), 1500);
    } else {
        btn.classList.add('wrong');
        showFB('❌ 推理有误，看看正确的思路！','error');
        const q = GS.questionsInLevel[qi];
        WeaknessTracker.recordWrong(GS.currentLevel, qi, 'reverse', q.scene, q.type);
        WeaknessTracker.recordViewAnswer(GS.currentLevel, qi, 'reverse', q.scene, q.type);
        let steps;
        if (q.type==='findW_p') steps=[`已知周长=${q.P}米，长=${q.l}米`,`先算半周长：${q.P}÷2=${q.P/2}米`,`宽=半周长-长=${q.P/2}-${q.l}=<strong>${correct}米</strong>`];
        else if (q.type==='findL_p') steps=[`已知周长=${q.P}米，宽=${q.w}米`,`先算半周长：${q.P}÷2=${q.P/2}米`,`长=半周长-宽=${q.P/2}-${q.w}=<strong>${correct}米</strong>`];
        else if (q.type==='findS') steps=[`已知周长=${q.P}米`,`正方形4条边一样长`,`边长=周长÷4=${q.P}÷4=<strong>${correct}米</strong>`];
        else if (q.type==='findW_a') steps=[`已知面积=${q.A}平方米，长=${q.l}米`,`面积=长×宽，所以宽=面积÷长`,`宽=${q.A}÷${q.l}=<strong>${correct}米</strong>`];
        else steps=[`已知面积=${q.A}平方米，宽=${q.w}米`,`面积=长×宽，所以长=面积÷宽`,`长=${q.A}÷${q.w}=<strong>${correct}米</strong>`];
        setTimeout(() => { showAnimExplain({ title:'侦探推理过程', shape:'', steps, result:`✅ 答案是 ${correct}米！` }); }, 800);
        setTimeout(() => { btns.forEach(b => { b.style.pointerEvents='auto'; b.classList.remove('wrong'); }); }, 1000);
    }
}

function makeShapeVis(w, h, topLabel, leftLabel, centerText) {
    return `<div class="visual-area"><div class="shape-visual" style="width:${w}px;height:${h}px"><span style="font-size:14px;color:#667eea">${centerText}</span><span class="shape-label top">${topLabel}</span><span class="shape-label left">${leftLabel}</span></div></div>`;
}

// ========== 关卡完成 ==========
function completeLevel() {
    const total = GS.questionsInLevel.length;
    const stars = GS.correctInLevel === total ? 3 : GS.correctInLevel >= total*0.6 ? 2 : 1;
    GS.levelsCompleted[GS.currentLevel] = true;
    hide('game-screen'); show('level-complete-screen');
    document.getElementById('level-stars').innerHTML = 
        '⭐'.repeat(stars).split('').map(s=>`<span class="star">${s}</span>`).join('') +
        '☆'.repeat(3-stars).split('').map(s=>`<span class="star">${s}</span>`).join('');
    const msg = stars===3 ? '🎉 完美通关！培训表现优秀！' : stars===2 ? '👍 不错！基本掌握了！' : '💪 加油，再练练！';
    let extra = '';
    if (GS.levelsCompleted.every(x=>x)) extra = '<br><br>🎓 <strong>恭喜！所有培训关卡已通过！校长批准你上岗啦！</strong>';
    document.getElementById('level-complete-msg').innerHTML = msg + extra;
    if (stars === 3) createConfetti();
}

function backToLevels() {
    hide('level-complete-screen');
    if (GS.levelsCompleted.every(x=>x)) { startPhase2(); }
    else { show('phase1-screen'); renderLevelGrid(); }
}

function playVoice(text, btn, customPitch) {
    if (btn) { btn.classList.add('playing'); }
    if ('speechSynthesis' in window) {
        window.speechSynthesis.cancel();
        const u = new SpeechSynthesisUtterance(text);
        u.lang = 'zh-CN'; 
        u.rate = 1.05;   // 小孩说话稍快一些，更活泼
        u.pitch = customPitch || 1.8;   // 高音调，听起来更可爱童真
        u.volume = 0.9;
        const voices = window.speechSynthesis.getVoices();
        // 优先选择小孩/童声/女声，让声音更可爱
        const childVoice = voices.find(v => v.lang.includes('zh') && (v.name.toLowerCase().includes('child') || v.name.toLowerCase().includes('kid')));
        const femaleVoice = voices.find(v => v.lang.includes('zh') && (v.name.toLowerCase().includes('female') || v.name.includes('女') || v.name.toLowerCase().includes('ting-ting') || v.name.toLowerCase().includes('sinji')));
        const zhVoice = voices.find(v => v.lang.includes('zh'));
        u.voice = childVoice || femaleVoice || zhVoice || null;
        u.onend = () => { if (btn) btn.classList.remove('playing'); };
        window.speechSynthesis.speak(u);
    } else {
        if (btn) setTimeout(() => btn.classList.remove('playing'), 2000);
    }
}

    const total = teachQs.flat().length;
    const pct = Math.round(GS.teachingScore / total * 100);
    let grade, eval_text;
    if (pct >= 80) { grade='🥇 优秀实习老师'; eval_text='太厉害了！学生们都学会了！你是超棒的老师！'; }
    else if (pct >= 60) { grade='🥈 合格实习老师'; eval_text='不错哦！大部分学生理解了，继续努力！'; }
    else { grade='💪 继续努力'; eval_text='还需多练习，再复习一下知识点吧！'; }

    // 生成薄弱点分析
    const analysis = WeaknessTracker.analyze();
    const suggestions = WeaknessTracker.getSuggestions(analysis.weaknesses);
    
    // 生成薄弱点报告HTML
    let weaknessHTML = '';
    if (analysis.weaknesses.length > 0) {
        weaknessHTML = `
        <div style="margin:25px 0">
            <h3 style="text-align:center;margin-bottom:15px;color:#e74c3c">⚠️ 知识薄弱点分析</h3>
            <div style="background:#fff5f5;border-radius:15px;padding:20px;border:2px solid #ffcdd2">
                <p style="text-align:center;color:#666;margin-bottom:15px;font-size:14px">
                    本次学习共答错 <strong style="color:#e74c3c">${analysis.totalErrors}</strong> 题，查看提示 <strong style="color:#ff9800">${analysis.totalHints}</strong> 次
                </p>
                ${analysis.weaknesses.map((w, i) => `
                    <div style="background:white;border-radius:12px;padding:15px;margin:10px 0;border-left:4px solid ${w.severity>=6?'#e74c3c':w.severity>=3?'#ff9800':'#ffc107'}">
                        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">
                            <strong style="font-size:16px">${i+1}. ${w.topicName}</strong>
                            <span style="font-size:12px;padding:3px 10px;border-radius:10px;background:${w.severity>=6?'#ffebee':w.severity>=3?'#fff3e0':'#fffde7'};color:${w.severity>=6?'#c62828':w.severity>=3?'#e65100':'#f57f17'}">
                                ${w.severity>=6?'❗ 需重点复习':w.severity>=3?'⚡ 需加强练习':'💡 稍加注意'}
                            </span>
                        </div>
                        <div style="font-size:13px;color:#666;display:flex;gap:15px;flex-wrap:wrap">
                            ${w.wrongCount > 0 ? `<span>❌ 答错 ${w.wrongCount} 次</span>` : ''}
                            ${w.hintCount > 0 ? `<span>💡 看提示 ${w.hintCount} 次</span>` : ''}
                            ${w.viewAnswerCount > 0 ? `<span>📖 看答案 ${w.viewAnswerCount} 次</span>` : ''}
                            ${w.teachWrongCount > 0 ? `<span>👨‍🏫 教学失误 ${w.teachWrongCount} 次</span>` : ''}
                        </div>
                        ${w.formulas.length > 0 ? `<div style="margin-top:8px;font-size:13px;color:#555;background:#f8f9fa;padding:8px 12px;border-radius:8px">📐 相关公式：${w.formulas.join('、')}</div>` : ''}
                    </div>
                `).join('')}
            </div>
        </div>
        
        <div style="margin:25px 0">
            <h3 style="text-align:center;margin-bottom:15px;color:#2e7d32">📝 针对性提高建议</h3>
            <div style="background:#e8f5e9;border-radius:15px;padding:20px;border:2px solid #c8e6c9">
                ${suggestions.map(s => `
                    <div style="background:white;border-radius:12px;padding:15px;margin:10px 0">
                        <div style="font-size:18px;margin-bottom:8px">${s.icon} <strong>${s.title}</strong></div>
                        <p style="font-size:14px;color:#555;margin-bottom:8px">💭 ${s.tip}</p>
                        <div style="background:#f1f8e9;border-radius:8px;padding:10px 15px;font-size:13px;color:#33691e">
                            🎯 <strong>练习方法：</strong>${s.practice}
                        </div>
                    </div>
                `).join('')}
            </div>
        </div>`;
    } else {
        weaknessHTML = `
        <div style="margin:25px 0;text-align:center">
            <div style="background:#e8f5e9;border-radius:15px;padding:30px;border:2px solid #c8e6c9">
                <span style="font-size:50px">🌟</span>
                <h3 style="color:#2e7d32;margin:10px 0">全部答对！零失误！</h3>
                <p style="color:#555">你对周长和面积的知识掌握得非常扎实，真棒！</p>
            </div>
        </div>`;
    }

    hide('phase2-screen'); show('final-screen');
    document.getElementById('final-content').innerHTML = `
        <div class="certificate">
            <h2>🏅 数学王国小学</h2>
            <h3>实习老师评价证书</h3>
            <div class="cert-stamp">📜</div>
            <p style="font-size:22px;margin:10px 0"><strong>${grade}</strong></p>
            <p>培训得分：${GS.score}分 | 教学得分：${GS.teachingScore}/${total} (${pct}%)</p>
            <p style="margin-top:15px;font-size:16px">${eval_text}</p>
        </div>
        
        <div style="margin:20px 0">
            <h3 style="text-align:center;margin-bottom:15px">📊 学生评价</h3>
            ${students.map(s=>`<div style="display:flex;align-items:center;padding:10px;border-bottom:1px solid #eee">
                <span style="font-size:30px;margin-right:15px">${s.emoji}</span>
                <div><strong>${s.name}</strong><p style="font-size:14px;color:#666">${pct>=80?'老师教得太好了！我全懂了！😊':pct>=60?'老师讲得还不错！':'老师下次加油哦！'}</p></div>
            </div>`).join('')}
        </div>
        
        ${weaknessHTML}
        
        <div style="margin:20px 0">
            <h3 style="text-align:center;margin-bottom:15px">📚 知识点总结</h3>
            <div class="formula-card">长方形周长 =（长＋宽）× 2</div>
            <div class="formula-card">正方形周长 = 边长 × 4</div>
            <div class="formula-card">长方形面积 = 长 × 宽</div>
            <div class="formula-card">正方形面积 = 边长 × 边长</div>
            <div class="formula-card">宽 = 周长÷2 - 长 | 宽 = 面积÷长</div>
            <div class="formula-card">长 = 周长÷2 - 宽 | 长 = 面积÷宽</div>
            <div class="formula-card">正方形边长 = 周长÷4</div>
        </div>
        <div style="text-align:center;margin-top:30px">
            <button class="btn btn-primary" onclick="restart()">🔄 再玩一次</button>
        </div>
    `;
    if (pct >= 80) createConfetti();
}

function restart() {
    GS.score=0; GS.levelsCompleted=[false,false,false,false,false];
    GS.correctInLevel=0; GS.teachingScore=0;
    WeaknessTracker.reset();
    hide('final-screen'); show('start-screen');
}

// ========== 工具函数 ==========
function genOptions(correct) {
    const s = new Set([correct]);
    while(s.size < 4) {
        let off = Math.floor(Math.random()*10)-5;
        if(off===0) off = Math.random()>0.5?1:-1;
        let w = correct + off;
        if(w > 0) s.add(w);
    }
    return [...s].sort(()=>Math.random()-0.5);
}

function showFB(msg, type) { const el = document.getElementById('feedback-area'); if(el) el.innerHTML = `<div class="feedback ${type}">${msg}</div>`; }
function showHint() { 
    const h = document.getElementById('hint-box'); 
    if(h) { 
        const wasHidden = h.classList.contains('hidden');
        h.classList.toggle('hidden'); 
        // 首次展开时记录
        if (wasHidden) {
            const topic = levels[GS.currentLevel] ? levels[GS.currentLevel].topic : 'unknown';
            WeaknessTracker.recordHint(GS.currentLevel, GS.currentQuestion, topic, '查看了提示');
        }
    } 
}
function hide(id) { document.getElementById(id).classList.add('hidden'); }
function show(id) { document.getElementById(id).classList.remove('hidden'); }

function createConfetti() {
    const c = document.getElementById('confetti-container');
    const colors = ['#f44336','#e91e63','#9c27b0','#3f51b5','#2196f3','#4caf50','#ffeb3b','#ff9800'];
    for(let i=0;i<40;i++){
        const p = document.createElement('div'); p.className='confetti-piece';
        p.style.left=Math.random()*100+'%';
        p.style.backgroundColor=colors[Math.floor(Math.random()*colors.length)];
        p.style.animationDelay=Math.random()*2+'s';
        p.style.borderRadius=Math.random()>0.5?'50%':'0';
        c.appendChild(p);
    }
    setTimeout(()=>c.innerHTML='',5000);
}
</script>
